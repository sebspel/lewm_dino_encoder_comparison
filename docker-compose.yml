# Single `app` service handling all roles by entrypoint command, e.g.
#   docker compose run app uv sync
#   docker compose run app python -m scripts.train.lewm
#   docker compose run app python -m src.export model=lewm precision=fp16
#   docker compose run app pytest -v
services:
  app:
    build:
      context: .
      args:
        NGC_TAG: ${NGC_TAG:-24.10-py3}
    image: lewm-dino:local
    working_dir: /workspace
    # Bind-mount the repo so code + the gitignored data/checkpoints/exports dirs
    # are never baked into the image.
    volumes:
      - .:/workspace
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    # GPU access on the L40S.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["bash"]
