# @package _global_
# LeWM track overlay (Phase 2). Enables W&B and pins the training hyperparameters to the
# LeWM paper values. This is an inference/optimisation study, so we emulate the original
# papers' training setup as closely as we can; these override the vendored platform
# defaults where they differ.
#   uv run python -m scripts.train.lewm --config-dir conf +experiment=lewm
#
# entity: null uses the logged-in account's default entity (or $WANDB_ENTITY).
wandb:
  enabled: true
  config:
    entity: null
    project: lewm-dino-encoder-comparison
# LeWM paper training hyperparameters: 10 epochs, batch size 128. (Vendored lewm.yaml
# default is max_epochs=100; batch_size is already 128 — pinned here so the setup is
# explicit.) Keys: trainer.max_epochs, loader.batch_size.
trainer:
  max_epochs: 10
loader:
  batch_size: 128
